{"visible":true,"text":{"rType":"text","val":"There are numerous organizations offering training in different topics such as gender planning, gender-sensitive approaches to resource allocation, community engagement, gender impact assessment, gender-responsive climate finance and others. These and related courses are offered by several UN agencies such as UN Women and ITC ILO, through online and blended training platforms."}},"title":{"rType":"text","val":"Gender equality and social inclusion training"}},"ggyH8ofl8":{"type":"element","id":"ggyH8ofl8","color":{"opac":1,"rgb":"var(--TC9)"},"icon":{"selectedKey":1,"visible":false},"title":{"rType":"text","val":"Allocate financial and technical resources"},"extendedDesc":{"visible":true,"text":{"rType":"text","val":"Allocate financial and technical resources to organizational and intervention budgets to meet gender and inclusion integration needs. The use of gender-responsive budgeting (GRB) tools can assist in facilitating this process."}}},"Ww0as2isA":{"type":"element","id":"Ww0as2isA","color":{"opac":1,"rgb":"#7c6914"},"icon":{"selectedKey":1,"visible":false},"title":{"rType":"text","val":"Gender analytical tools"},"extendedDesc":{"visible":true,"text":{"rType":"text","val":"Institutions and organisations involved in drought management should orient staff on gender analytical frameworks and tools that are commonly used to generate information and data on gender and social inclusion aspects. This vital information and data should subsequently be incorporated in the drought planning and management process."}}},"NWLTFCNNf":{"type":"element","id":"NWLTFCNNf","color":{"opac":1,"rgb":"#bd8e71"},"icon":{"selectedKey":1,"visible":false},"title":{"rType":"text","val":"Embed gender and social equity in planning"},"extendedDesc":{"visible":true,"text":{"rType":"text","val":"Gender integration should become routine professional practice, with gender considerations included at all stages of drought planning—assessment, implementat
